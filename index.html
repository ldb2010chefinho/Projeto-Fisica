<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
    <script src="script.js" defer></script>
</head>

<body>
    <div id="conteiner">
        <h1>Calculadora de movimento</h1>

        <hr>

        <div id="escolha">
            <select id="tipo" required>
                <option value="mru">MRU</option>
                <option value="mruv1">MRUV1</option>
                <option value="mruv2">MRUV2</option>
                <option value="mruv3">MRUV3</option>
            </select>
        </div>

        <br>

        <div id="entradaValores">
            <label id="label_espaco" for="espaco">Espaço</label>
            <br>
            <input id="espaco" type="number">

            <br>

            <label id="label_espaco_inicial" for="espaco_inicial">Espaço Inicial</label>
            <br>
            <input id="espaco_inicial" type="number">

            <br>

            <label id="label_posicao_inicial" for="posicao_inicial">Posição Inicial</label>
            <br>
            <input id="posicao_inicial" type="number">

            <br>

            <label id="label_posicao" for="posicao">Posição</label>
            <br>
            <input id="posicao" type="number">

            <br>

            <label id="label_velocidade_inicial" for="velocidade_inicial">Velocidade Inicial</label>
            <br>
            <input id="velocidade_inicial" type="number">

            <br>

            <label id="label_velocidade" for="velocidade">Velocidade</label>
            <br>
            <input id="velocidade" type="number">

            <br>

            <label id="label_tempo" for="tempo">Tempo</label>
            <br>
            <input id="tempo" type="number">

            <br>

            <label id="label_aceleracao" for="aceleracao">Aceleração</label>
            <br>
            <input id="aceleracao" type="number">

            <br>

            <label id="label_variacaoEspaco" for="variacaoEspaco">Variação do Espaço</label>
            <br>
            <input id="variacaoEspaco" type="number">

            <br>

            <input type="submit" id="btn_enviar" value="Enviar">
        </div>

        <canvas id="grafico"></canvas>
    </div>
</body>
</html>
